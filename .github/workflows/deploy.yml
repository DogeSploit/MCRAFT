name: Manual Deploy
on:
  push:
    branches:
      - Main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and Build
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
          pnpm build
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
